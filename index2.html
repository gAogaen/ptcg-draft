<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Pokémon Card Draft Board</title>

<style>
*{box-sizing:border-box}
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:
radial-gradient(circle at 20% 20%,rgba(59,130,246,.35),transparent 30%),
radial-gradient(circle at 80% 30%,rgba(251,191,36,.25),transparent 30%),
linear-gradient(135deg,#020617,#0f172a,#111827);
color:#fff;
min-height:100vh;
padding:20px;
overflow-x:auto;
}

.glow{
position:fixed;
inset:0;
pointer-events:none;
background:
radial-gradient(circle at 15% 25%,rgba(56,189,248,.15),transparent 20%),
radial-gradient(circle at 75% 20%,rgba(250,204,21,.12),transparent 25%),
radial-gradient(circle at 50% 80%,rgba(59,130,246,.10),transparent 30%);
}

.controls{
text-align:center;
margin-bottom:20px;
}

button{
border:none;
padding:12px 18px;
border-radius:12px;
font-weight:700;
cursor:pointer;
margin:4px;
}

.gold{background:#fbbf24;color:#111}
.dark{background:#1e293b;color:white}

#capture{
max-width:1600px;
margin:auto;
padding:24px;
border-radius:24px;
background:rgba(255,255,255,.06);
backdrop-filter:blur(14px);
border:1px solid rgba(255,255,255,.15);
box-shadow:
0 0 50px rgba(59,130,246,.15),
0 0 100px rgba(251,191,36,.08);
}

#title{
text-align:center;
font-size:clamp(28px,4vw,64px);
font-weight:900;
letter-spacing:2px;
margin-bottom:20px;
outline:none;
color:#f8fafc;
text-shadow:
0 0 10px rgba(255,255,255,.4),
0 0 20px rgba(59,130,246,.4);
}

.subtitle{
text-align:center;
opacity:.8;
margin-bottom:24px;
}

table{
width:100%;
border-collapse:collapse;
overflow:hidden;
border-radius:16px;
}

th{
background:linear-gradient(90deg,#fbbf24,#fde68a);
color:#111;
padding:14px;
font-size:18px;
}

td{
padding:12px;
border:1px solid rgba(255,255,255,.08);
background:rgba(255,255,255,.03);
}

.rank{
font-weight:800;
text-align:center;
width:70px;
background:rgba(255,255,255,.08);
}

[contenteditable]{
outline:none;
}

.footer{
margin-top:16px;
text-align:right;
opacity:.55;
font-size:12px;
}
</style>
</head>
<body>

<div class="glow"></div>

<div class="controls">
<button class="dark" onclick="addPlayer()">参加者追加</button>
<button class="gold" onclick="saveImage()">X投稿用画像を保存</button>
</div>

<div id="capture">

<div id="title" contenteditable="true">
🏆 ワンタンdot ドラフト会議 2026
</div>

<div class="subtitle">
大会名をタップして編集できます
</div>

<table id="draftTable">
<tr>
<th>順位</th>
<th contenteditable>Aよし</th>
<th contenteditable>Hiro</th>
<th contenteditable>あめれ</th>
<th contenteditable>uk</th>
<th contenteditable>カボタク</th>
</tr>
</table>

<div class="footer">
Pokémon Card Draft Reveal Board
</div>

</div>

<script>
const table=document.getElementById('draftTable');

for(let i=1;i<=8;i++){
const row=table.insertRow();
row.innerHTML=`
<td class="rank">${i}</td>
<td contenteditable></td>
<td contenteditable></td>
<td contenteditable></td>
<td contenteditable></td>
<td contenteditable></td>`;
}

function addPlayer(){
table.rows[0].insertCell(-1).outerHTML='<th contenteditable>新規参加者</th>';

for(let i=1;i<table.rows.length;i++){
let c=table.rows[i].insertCell(-1);
c.contentEditable=true;
}
}

function saveImage(){

if(!window.html2canvas){
const script=document.createElement('script');
script.src='https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
script.onload=render;
document.body.appendChild(script);
}else{
render();
}

function render(){
html2canvas(document.getElementById('capture'),{
scale:2,
backgroundColor:null
}).then(canvas=>{
const link=document.createElement('a');
link.download='draft-board.png';
link.href=canvas.toDataURL('image/png');
link.click();
});
}
}
</script>

</body>
</html>

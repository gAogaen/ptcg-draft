<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Draft Board</title>
    <link href="https://fonts.googleapis.com/css2?family=Bangers&family=Kosugi+Maru&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { margin: 0; font-family: 'Kosugi Maru', sans-serif; background: #ffe4e1; padding: 20px; display: flex; flex-direction: column; align-items: center; }
        
        #title { font-family: 'Bangers', cursive; font-size: 48px; color: #ff4500; text-shadow: 2px 2px 0 #fff, 0 4px 0 #000; text-align: center; margin-bottom: 20px; }
        
        .controls { margin-bottom: 20px; }
        button { font-family: 'Bangers', cursive; padding: 10px 20px; border-radius: 50px; border: 3px solid #000; cursor: pointer; font-size: 18px; margin: 5px; background: #ffd700; }
        
        #capture { width: 100%; max-width: 900px; padding: 30px; background: #fff; border-radius: 30px; border: 6px dashed #ff1493; }
        
        .board-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; margin-top: 20px; }
        
        .player-card { background: #fff; padding: 10px; border: 3px solid #000; border-radius: 15px; }
        .player-header { background: #ff69b4; color: #fff; padding: 5px; text-align: center; font-family: 'Bangers', cursive; border: 2px solid #000; margin-bottom: 10px; }
        .pick-row { display: flex; align-items: center; gap: 5px; margin-bottom: 5px; }
        .pick-rank { width: 25px; height: 25px; background: #333; color: #fff; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 12px; }
        .pick-name { flex: 1; border: 1px solid #ccc; padding: 5px; border-radius: 5px; min-height: 20px; }
    </style>
</head>
<body>

    <div class="controls">
        <button onclick="addPlayer()">追加！</button>
        <button onclick="saveImage()">画像を保存！</button>
    </div>

    <div id="capture">
        <div id="title" contenteditable="true">DRAFT BOARD!</div>
        <div class="board-grid" id="draftBoard"></div>
    </div>

    <script>
        const board = document.getElementById('draftBoard');

        function createPlayerCard(name = '名前') {
            const card = document.createElement('div');
            card.className = 'player-card';
            card.innerHTML = `<div class="player-header" contenteditable>${name}</div>`;
            for (let i = 1; i <= 6; i++) {
                card.innerHTML += `
                    <div class="pick-row">
                        <div class="pick-rank">${i}</div>
                        <div class="pick-name" contenteditable></div>
                    </div>`;
            }
            board.appendChild(card);
        }

        // 初期表示
        ['Aよし', 'Hiro', 'あめれ', 'uk', 'カボタク'].forEach(name => createPlayerCard(name));

        function addPlayer() { createPlayerCard(); }

        function saveImage() {
            html2canvas(document.getElementById('capture')).then(canvas => {
                const link = document.createElement('a');
                link.download = 'draft.png';
                link.href = canvas.toDataURL('image/png');
                link.click();
            });
        }
    </script>
</body>
</html>

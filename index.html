
<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Draft Reveal Board</title>
<style>
body{
margin:0;
font-family:-apple-system,BlinkMacSystemFont,sans-serif;
background:linear-gradient(135deg,#0f172a,#1e293b);
color:white;
padding:20px;
}
h1{
text-align:center;
font-size:42px;
letter-spacing:2px;
}
#capture{
max-width:1400px;
margin:auto;
background:rgba(255,255,255,.06);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,.1);
border-radius:24px;
padding:24px;
box-shadow:0 20px 60px rgba(0,0,0,.4);
}
table{
width:100%;
border-collapse:collapse;
}
th{
background:#f59e0b;
color:#111;
font-size:20px;
padding:14px;
}
td{
border:1px solid rgba(255,255,255,.1);
padding:12px;
font-size:18px;
}
.rank{
width:70px;
text-align:center;
font-weight:bold;
background:rgba(255,255,255,.05);
}
[contenteditable]{
outline:none;
}
.controls{
text-align:center;
margin:20px;
}
button{
border:none;
padding:14px 22px;
margin:5px;
border-radius:12px;
cursor:pointer;
font-size:16px;
font-weight:bold;
}
.primary{background:#f59e0b;}
.secondary{background:#334155;color:white;}
.footer{
margin-top:16px;
text-align:right;
opacity:.7;
}
</style>
</head>
<body>

<h1>🏆 DRAFT REVEAL BOARD</h1>

<div class="controls">
<button class="secondary" onclick="addPlayer()">参加者追加</button>
<button class="primary" onclick="saveImage()">X投稿用画像を保存</button>
</div>

<div id="capture">
<table id="draftTable">
<tr>
<th>順位</th>
<th contenteditable>Aよし</th>
<th contenteditable>Hiro</th>
<th contenteditable>あめれ</th>
<th contenteditable>uk</th>
</tr>
</table>

<div class="footer">Generated by Draft Reveal Board</div>
</div>

<script>
const table=document.getElementById("draftTable");

for(let i=1;i<=8;i++){
let row=table.insertRow();
row.innerHTML=`<td class="rank">${i}</td>
<td contenteditable></td>
<td contenteditable></td>
<td contenteditable></td>
<td contenteditable></td>`;
}

function addPlayer(){
table.rows[0].insertCell(-1).outerHTML='<th contenteditable>新規参加者</th>';
for(let i=1;i<table.rows.length;i++){
let c=table.rows[i].insertCell(-1);
c.contentEditable=true;
}
}

function saveImage(){
const s=document.createElement('script');
s.src='https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
s.onload=()=>{
html2canvas(document.getElementById('capture'),{
backgroundColor:null,
scale:2
}).then(canvas=>{
const a=document.createElement('a');
a.download='draft-reveal.png';
a.href=canvas.toDataURL('image/png');
a.click();
});
};
document.body.appendChild(s);
}
</script>

</body>
</html>

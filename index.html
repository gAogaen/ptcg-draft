<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Draft Board</title>
    <link href="https://fonts.googleapis.com/css2?family=Kosugi+Maru&display=swap" rel="stylesheet">
    <style>
        body {
            background: #fff0f5; /* ポップなパステル背景 */
            font-family: 'Kosugi Maru', sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px;
        }

        /* 全体コンテナを紙のように見せる */
        #capture {
            background: #ffffff;
            padding: 40px;
            border-radius: 30px;
            border: 4px dashed #ff69b4; /* 手書き風の破線 */
            box-shadow: 10px 10px 0px #ffc0cb;
            width: 100%;
            max-width: 800px;
        }

        h1 { color: #ff69b4; text-align: center; margin-top: 0; }

        /* 表の代わりに「Flexbox」で横並びを作る */
        .board {
            display: flex;
            gap: 20px;
            overflow-x: auto;
            padding: 20px 0;
        }

        .column {
            flex: 1;
            min-width: 120px;
        }

        .header-cell {
            background: #ff69b4;
            color: white;
            padding: 10px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 10px;
            font-weight: bold;
        }

        .item {
            background: #f0f8ff;
            margin-bottom: 8px;
            padding: 10px;
            border-radius: 10px;
            border: 2px solid #87ceeb;
            text-align: center;
            min-height: 2em;
        }

        button {
            padding: 15px 30px;
            border-radius: 50px;
            border: none;
            background: #ff69b4;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

    <button onclick="saveImage()">画像を保存する！</button>

    <div id="capture">
        <h1>ドラフト会議！</h1>
        <div class="board" id="draftBoard">
            </div>
    </div>

    <script>
        const board = document.getElementById('draftBoard');
        
        // 5人分初期生成
        for (let i = 0; i < 5; i++) {
            const col = document.createElement('div');
            col.className = 'column';
            col.innerHTML = `<div class="header-cell" contenteditable>名前</div>`;
            for (let j = 0; j < 6; j++) {
                col.innerHTML += `<div class="item" contenteditable></div>`;
            }
            board.appendChild(col);
        }

        function saveImage() {
            // html2canvasを使って画像を保存する処理は以前と同じ
            alert("画像保存処理を実行します");
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>ドラフト指名結果</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box}
body{
margin:0;
font-family:'Noto Sans JP',sans-serif;
background:#05070d url('bg.svg') center/cover fixed;
color:#fff;
}
.header{
text-align:center;
padding:20px;
}
.title{
font-size:clamp(32px,6vw,72px);
font-weight:900;
letter-spacing:4px;
text-shadow:0 0 20px rgba(255,255,255,.3);
transform:skew(-8deg);
}
.controls{
padding:15px;
background:rgba(0,0,0,.6);
backdrop-filter:blur(8px);
position:sticky;
top:0;
z-index:10;
}
input,select{
width:100%;
padding:8px;
margin:4px 0 10px;
border:none;
border-radius:6px;
}
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:14px;
padding:20px;
}
.team{
background:rgba(10,10,20,.8);
border:2px solid var(--c);
box-shadow:0 0 20px color-mix(in srgb,var(--c) 50%, transparent);
}
.team h2{
margin:0;
padding:10px;
background:var(--c);
font-style:italic;
}
.player{
padding:8px 12px;
border-top:1px solid rgba(255,255,255,.1);
font-weight:700;
}
@media (orientation:landscape){
.grid{grid-template-columns:repeat(3,1fr);}
}
</style>
</head>
<body>
<div class="header">
<div class="title">ドラフト指名結果</div>
</div>

<div class="controls">
<label>大会名</label>
<input id="eventTitle" value="ワンタン杯">
<label>チーム数</label>
<select id="teamCount"></select>
<div id="editor"></div>
</div>

<div id="board" class="grid"></div>

<script>
const colors=["#ff3030","#2aa8ff","#b030ff","#00d47c","#ff8a00","#ffd000"];
const teamCount=document.getElementById("teamCount");
for(let i=1;i<=6;i++)teamCount.innerHTML+=`<option>${i}</option>`;
teamCount.value=3;

function buildEditor(){
const editor=document.getElementById("editor");
editor.innerHTML="";
for(let t=0;t<teamCount.value;t++){
let html=`<hr><h3>チーム${t+1}</h3>
<input class="teamName" value="TEAM ${t+1}">`;
for(let p=0;p<6;p++){
html+=`<input class="player" value="PLAYER ${p+1}">`;
}
editor.innerHTML+=html;
}
render();
document.querySelectorAll("input").forEach(i=>i.oninput=render);
}

function render(){
document.querySelector(".title").textContent=document.getElementById("eventTitle").value||"ドラフト指名結果";
const board=document.getElementById("board");
board.innerHTML="";
document.querySelectorAll("h3").forEach((_,idx)=>{
const names=[...document.querySelectorAll(".teamName")][idx];
const players=[...document.querySelectorAll(".player")].slice(idx*6,idx*6+6);
const card=document.createElement("div");
card.className="team";
card.style.setProperty("--c",colors[idx]);
card.innerHTML=`<h2>${names.value}</h2>`+players.map((p,i)=>`<div class='player'>${String(i+1).padStart(2,"0")} ${p.value}</div>`).join("");
board.appendChild(card);
});
}

teamCount.onchange=buildEditor;
document.getElementById("eventTitle").oninput=render;
buildEditor();
</script>
</body>
</html>

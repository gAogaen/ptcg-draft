<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">
    <title>Pokémon Card Draft Board</title>

    <style>
        * { box-sizing: border-box; }
        body {
            margin: 0;
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background: #0f172a;
            color: #f1f5f9;
            min-height: 100vh;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 全体コンテナ */
        #capture {
            width: 100%;
            max-width: 900px;
            background: linear-gradient(160deg, #1e293b, #0f172a);
            padding: 30px;
            border-radius: 20px;
            border: 1px solid #334155;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
        }

        /* タイトル周り */
        #title {
            font-size: 2rem;
            font-weight: 800;
            text-align: center;
            margin-bottom: 5px;
            color: #fbbf24; /* ドラフトっぽいゴールド */
            text-shadow: 0 0 20px rgba(251, 191, 36, 0.3);
        }

        .subtitle {
            text-align: center;
            font-size: 0.9rem;
            color: #94a3b8;
            margin-bottom: 20px;
        }

        /* テーブルデザイン */
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid #334155;
        }

        th {
            background: #fbbf24;
            color: #0f172a;
            padding: 12px;
            text-align: center;
            font-weight: 700;
        }

        td {
            padding: 12px;
            border-bottom: 1px solid #334155;
            background: rgba(255, 255, 255, 0.03);
            text-align: center;
        }

        .rank {
            background: rgba(255, 255, 255, 0.06);
            font-weight: bold;
            width: 60px;
        }

        /* 入力欄の見た目 */
        [contenteditable]:hover {
            background: rgba(255, 255, 255, 0.1);
        }

        [contenteditable]:focus {
            background: rgba(255, 255, 255, 0.15);
            outline: 2px solid #fbbf24;
        }

        /* ボタン */
        .controls { margin-bottom: 20px; text-align: center; }
        button {
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s, opacity 0.2s;
            border: none;
            margin: 4px;
        }
        button:active { transform: scale(0.95); }
        .gold { background: #fbbf24; color: #000; }
        .dark { background: #475569; color: #fff; }

        .footer { text-align: right; margin-top: 15px; color: #64748b; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="controls">
        <button class="dark" onclick="addPlayer()">参加者追加</button>
        <button class="gold" onclick="saveImage()">X投稿用画像を保存</button>
    </div>

    <div id="capture">
        <div id="title" contenteditable="true">
            🏆 ワンタンdot ドラフト会議 2026
        </div>
        <div class="subtitle">
            大会名をタップして編集できます
        </div>

        <table id="draftTable">
            <tr>
                <th>順位</th>
                <th contenteditable>Aよし</th>
                <th contenteditable>Hiro</th>
                <th contenteditable>あめれ</th>
                <th contenteditable>uk</th>
                <th contenteditable>カボタク</th>
            </tr>
        </table>

        <div class="footer">
            Pokémon Card Draft Reveal Board
        </div>
    </div>

    <script>
        const table = document.getElementById('draftTable');

        // 行の生成
        for (let i = 1; i <= 8; i++) {
            const row = table.insertRow();
            row.innerHTML = `
                <td class="rank">${i}</td>
                <td contenteditable></td>
                <td contenteditable></td>
                <td contenteditable></td>
                <td contenteditable></td>
                <td contenteditable></td>`;
        }

        function addPlayer() {
            table.rows[0].insertCell(-1).outerHTML = '<th contenteditable>新規参加者</th>';
            for (let i = 1; i < table.rows.length; i++) {
                let c = table.rows[i].insertCell(-1);
                c.contentEditable = true;
            }
        }

        function saveImage() {
            if (!window.html2canvas) {
                const script = document.createElement('script');
                script.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js';
                script.onload = render;
                document.body.appendChild(script);
            } else {
                render();
            }

            function render() {
                html2canvas(document.getElementById('capture'), {
                    scale: 2,
                    backgroundColor: "#0f172a"
                }).then(canvas => {
                    const link = document.createElement('a');
                    link.download = 'draft-board.png';
                    link.href = canvas.toDataURL('image/png');
                    link.click();
                });
            }
        }
    </script>
</body>
</html>
